{% extends "base.html" %}
{% load thumbnail %}
{% load static %}
{% block title %}Personas{% endblock %}

{% block content %}
  <h1>Personas</h1>
  <div id="people-list">
    {% for user in users %}
      <div class="user">
        <a href="{{ user.get_absolute_url }}">
            {% if user.profile.photo %}
            <img src="{% thumbnail user.profile.photo 180x180 %}">
            {% else %}
            <img src="{% static 'default/user_default.png' %}">
            {% endif %}
        </a>
        <div class="info">
          <a href="{{ user.get_absolute_url }}" class="title">
            {{ user.get_full_name }}
          </a>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
