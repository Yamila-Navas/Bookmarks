{% extends "base.html" %}
{% block title %}Restablecer tu contraseña{% endblock %}
{% block content %}
<h1>¿Olvidaste tu contraseña?</h1>
<p>Ingresa tu correo electrónico para obtener una nueva contraseña.</p>
<form method="post">
    {{ form.as_p }}
    <p><input type="submit" value="Enviar correo"></p>
    {% csrf_token %}
</form>
{% endblock %}
