{% extends "base.html" %}
{% block title %}Guardar una imagen{% endblock %}
{% block content %}
<h1>Guardar una imagen</h1>
<img src="{{ request.GET.url }}" class="image-preview">
<form method="post">
    {{ form.as_p }}
    {% csrf_token %}
    <input type="submit" value="¡Guardar imagen!">
</form>
{% endblock %}
